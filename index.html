            border-radius: 40px;

            font-weight: bold;

            font-size: 13px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.3);
        }

        .btn-primary {
            background: #ffd700;
            color: #1a1a2e;
        }

        .btn-success {
            background: #2e7d32;
            color: white;
        }

        .btn-danger {
            background: #c62828;
            color: white;
        }

        .btn-info {
            background: #0d47a1;
            color: white;
        }

            margin-top: 20px;
            margin-bottom: 10px;

            font-weight: bold;
            display: block;
            margin-bottom: 8px;

            align-items: center;
            flex-wrap: wrap;

            height: 28px;
            border-radius: 30px;

            font-weight: bold;
            font-size: 16px;

            background: #b33;
        }

            color: #ffd966;
            font-weight: bold;
            min-width: 32px;
            text-align: center;
            font-size: 16px;
        }

            text-align: center;

    let importedPlayers = [];
    let bestHandUUID = null;

    function showStatus(msg, type) {
        const div = document.getElementById('status');
        div.textContent = msg;
        div.className = `status ${type}`;
        setTimeout(() => { if(div) div.className = 'status'; }, 4000);
    }

    function generateUUID() {
        return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
            const r = Math.random() * 16 | 0;
            const v = c === 'x' ? r : (r & 0x3 | 0x8);
            return v.toString(16);
        });
    }

    function isOrganizacao(name) {
        return ORGANIZACAO_LIST.some(n => n.toLowerCase() === name.trim().toLowerCase());
    }

    function updateBestHand() {
        const sel = document.getElementById('bestHandPlayer');
        bestHandUUID = sel.value || null;
        displayPreview();
    }

    function displayPreview() {
        const container = document.getElementById('previewList');
        if(!importedPlayers.length) {
            container.innerHTML = '<div style="text-align:center;color:#aaa;padding:20px;">Nenhum jogador</div>';
            document.getElementById('bestHandSelector').style.display = 'none';
            return;
        }
        document.getElementById('bestHandSelector').style.display = 'block';
        const totalEntries = importedPlayers.length;
        const totalRebuys = importedPlayers.reduce((s,p)=>s+p.rebuys,0);
        const totalAddons = importedPlayers.reduce((s,p)=>s+p.addons,0);
        container.innerHTML = `<div class="total-summary">🎯 ${totalEntries} jogadores | 🔁 ${totalRebuys} rebuys | 💰 ${totalAddons} add-ons</div>`;
        importedPlayers.forEach(p => {
            const isBest = (bestHandUUID === p.uuid);
            container.innerHTML += `
            <div class="player-card ${isBest ? 'best-hand' : ''}">
                <div class="player-name">${escapeHtml(p.nickname)} ${isBest ? '<span class="profile-badge best-hand">🏆 MELHOR MÃO 🏆</span>' : ''}</div>
                <div class="player-controls">
                    <div class="control-group"><label>🔁 Rebuys</label><button class="minus" onclick="modRebuys('${p.uuid}', -1)">-</button><span id="reb-${p.uuid}">${p.rebuys}</span><button onclick="modRebuys('${p.uuid}', 1)">+</button></div>
                    <div class="control-group"><label>💰 Add-ons</label><button class="minus" onclick="modAddons('${p.uuid}', -1)">-</button><span id="ad-${p.uuid}">${p.addons}</span><button onclick="modAddons('${p.uuid}', 1)">+</button></div>
                </div>
            </div>`;
        });
        const select = document.getElementById('bestHandPlayer');
        select.innerHTML = '<option value="">-- Nenhum --</option>';
        importedPlayers.forEach(p => {
            const opt = document.createElement('option');
            opt.value = p.uuid;
            opt.textContent = p.nickname;
            if(bestHandUUID === p.uuid) opt.selected = true;
            select.appendChild(opt);
        });
    }

    window.modRebuys = (uuid, delta) => {
        const p = importedPlayers.find(x=>x.uuid===uuid);
        if(p) { p.rebuys = Math.max(0, p.rebuys+delta); displayPreview(); }
    };
    window.modAddons = (uuid, delta) => {
        const p = importedPlayers.find(x=>x.uuid===uuid);
        if(p) { p.addons = Math.max(0, p.addons+delta); displayPreview(); }
    };

    function importCSV() {
        const raw = document.getElementById('csvInput').value;
        if(!raw.trim()) { showStatus("Cole os dados CSV primeiro", "error"); return; }
        const lines = raw.split(/\r?\n/);
        const players = [];
        for(let line of lines) {
            if(!line.trim()) continue;
            let sep = line.includes(';') ? ';' : ',';
            const parts = line.split(sep);
            if(parts.length<3) continue;
            const nickname = parts[0].trim();
            const rebuys = parseInt(parts[1])||0;
            const addons = parseInt(parts[2])||0;
            let uuid = (parts.length>3 && parts[3].trim())? parts[3].trim() : generateUUID();
            if(nickname) players.push({ uuid, nickname, rebuys, addons, isOrganizacao: isOrganizacao(nickname) });
        }
        if(!players.length) { showStatus("Nenhum jogador válido", "error"); return; }
        importedPlayers = players;
        bestHandUUID = null;
        showStatus(`✅ ${players.length} jogadores importados.`, "success");
        displayPreview();
        document.getElementById('generateBtn').disabled = false;
        document.getElementById('copyBtn').disabled = false;
    }

    async function fetchOnlineData() {
        showStatus("🔄 Buscando dados remotos...", "info");
        try {
            const resp = await fetch(REMOTE_CSV_URL, { mode: 'cors', cache: 'no-cache' });
            if(!resp.ok) throw new Error("Falha fetch");
            const data = await resp.text();
            document.getElementById('csvInput').value = data;
            importCSV();
            showStatus("✅ Dados importados do servidor", "success");
        } catch(e) {
            showStatus("⚠️ Servidor offline, insira manualmente", "error");
        }
    }

    function clearAll() {
        document.getElementById('csvInput').value = '';
        importedPlayers = [];
        bestHandUUID = null;
        displayPreview();
        document.getElementById('codeOutput').innerText = "Importe um CSV para gerar código...";
        document.getElementById('generateBtn').disabled = true;
        document.getElementById('copyBtn').disabled = true;
        showStatus("Dados limpos", "success");
    }

    function generateFinalCode() {
        if(!importedPlayers.length) { showStatus("Importe jogadores primeiro", "error"); return; }
        const rake = parseInt(document.getElementById('rakeValue').value) || 0;
        const playersEntries = [];
        for(const p of importedPlayers) {
            const isOrg = p.isOrganizacao;
            const hasFreeAddon = isOrg || (bestHandUUID === p.uuid);
            const addonProfile = hasFreeAddon ? "ORGANIZACAO" : "Master";
            const addonFee = hasFreeAddon ? ADDON_FEE_ZERO : ADDON_FEE_NORMAL;
            let buysArr = [`new GameBuyin({Time: ${BUYIN_TIMESTAMP}, Round: 1, Amount: ${BUYIN_FEE}, PersonalBounty: 0, Rake: new PerPlayerRake([0]), Chips: ${CHIPS_PER_BUYIN}, Points: 0, ProfileName: "Master"})`];
            for(let i=0;i<p.rebuys;i++) buysArr.push(`new GameBuyin({Time: ${REBUY_TIMESTAMP}, Round: 1, Amount: ${REBUY_FEE}, PersonalBounty: 0, Rake: new PerPlayerRake([0]), Chips: ${CHIPS_PER_BUYIN}, Points: 0, ProfileName: "Master"})`);
            let addonsArr = [];
            for(let i=0;i<p.addons;i++) addonsArr.push(`new GameAddOn({Time: ${ADDON_TIMESTAMP}, Round: ${ADDON_ROUND_LAST}, Amount: ${addonFee}, Rake: new PerPlayerRake([0]), Chips: ${CHIPS_PER_ADDON}, Points: 0, ProfileName: "${addonProfile}"})`);
            const totalChips = CHIPS_PER_BUYIN + (p.rebuys * CHIPS_PER_BUYIN) + (p.addons * CHIPS_PER_ADDON);
            playersEntries.push(`["${p.uuid}", new GamePlayer({ UUID: "${p.uuid}", Name: new PlayerName({UUID: "${p.uuid}", Nickname: "${escapeJson(p.nickname)}", Firstname: "", Lastname: "", LastModified: 1776802998912}), Info: new PlayerInfo({UUID: "${p.uuid}", StreetAddress: "", City: "", State: "", Zipcode: "", Country: "", Phone1: "", Phone2: "", Email1: "", Email2: "", Notes: "", LastModified: 1776802998916, OptID: ""}), Buyins: [${buysArr.join(', ')}], AddOns: [${addonsArr.join(', ')}], CashAdjustment: 0, PointsAdjustment: 0, ChipCount: ${totalChips}, NumberOfTableMoves: 1, PaidInFull: true, HitsAdjustment: 0 })]`);
        }
        const seatsArray = importedPlayers.map(p => `"${p.uuid}"`).join(', ');
        const locksArray = Array(importedPlayers.length).fill('undefined').join(', ');
        let full = BASE_TEMPLATE
            .replace(/RAKE_VALUE_PLACEHOLDER/g, rake)
            .replace('PLAYERS_PLACEHOLDER', playersEntries.join(', '))
            .replace('SEATS_PLACEHOLDER', importedPlayers.length)
            .replace('SEATS_ARRAY_PLACEHOLDER', seatsArray)
            .replace('LOCKS_ARRAY_PLACEHOLDER', locksArray);
        document.getElementById('codeOutput').innerText = full;
        showStatus(`✅ Código gerado! Rake: R$ ${rake}`, "success");
    }

    function copyFinalCode() {
        const codeElem = document.getElementById('codeOutput');
        if(!codeElem.innerText || codeElem.innerText.includes("Aguardando")){
            showStatus("Gere o código primeiro", "error"); return;
        }
        navigator.clipboard.writeText(codeElem.innerText);
        showStatus("📋 Código copiado para área de transferência", "success");
    }

    function escapeHtml(str) { return str.replace(/[&<>]/g, function(m){if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }
    function escapeJson(str) { return str.replace(/"/g, '\\"'); }
</script>
