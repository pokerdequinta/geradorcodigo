<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Código - Rebuys e Add-ons | Poker de Quinta</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', ANTON, Roboto, ANTON, sans-serif;
            background: linear-gradient(135deg, #0a2a1a 0%, #051a0e 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px 0;
        }

        .logo {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 15px;
        }

        .logo img {
            max-width: 180px;
            height: auto;
            filter: drop-shadow(0 0 10px rgba(0,0,0,0.3));
        }

        .title {
            text-align: center;
            color: #ffd700;
            font-size: 2em;
            margin-top: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            letter-spacing: 2px;
        }

        .subtitle {
            text-align: center;
            color: #aaa;
            font-size: 0.85em;
            margin-top: 8px;
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
        }

        .card {
            background: rgba(0,0,0,0.85);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid #ffd700;
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
        }

        .card-title {
            font-size: 1.2em;
            color: #ffd700;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #ffd700;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .btn {
            background: #ffd700;
            color: #1a1a2e;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            margin-right: 10px;
            margin-top: 10px;
            transition: all 0.3s;
            font-size: 13px;
        }

        .btn:hover {
            transform: translateY(-2px);
            background: #ffed4a;
        }

        .btn-primary {
            background: #ffd700;
            color: #1a1a2e;
        }

        .btn-success {
            background: #28a745;
            color: white;
        }

        .btn-danger {
            background: #dc3545;
            color: white;
        }

        .btn-info {
            background: #17a2b8;
            color: white;
        }

        .csv-area textarea {
            width: 100%;
            height: 180px;
            background: #0a0a0a;
            border: 1px solid #ffd700;
            color: #00ff00;
            padding: 12px;
            font-family: 'Courier New', monospace;
            font-size: 11px;
            border-radius: 8px;
            resize: vertical;
        }

        .rake-config {
            background: rgba(0,0,0,0.5);
            border-radius: 8px;
            padding: 15px;
            margin-top: 15px;
            margin-bottom: 15px;
        }

        .rake-config label {
            color: #ffd700;
            font-weight: bold;
            display: block;
            margin-bottom: 8px;
        }

        .rake-config input {
            width: 100%;
            padding: 10px;
            background: #0a0a0a;
            border: 1px solid #ffd700;
            color: #fff;
            border-radius: 6px;
            font-size: 14px;
        }

        .players-list {
            max-height: 380px;
            overflow-y: auto;
            margin-top: 15px;
        }

        .player-card {
            background: rgba(255,255,255,0.05);
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 8px;
            transition: all 0.2s;
            border-left: 3px solid #ffd700;
        }

        .player-card.best-hand {
            border-left-color: #ff00ff;
            background: rgba(255,0,255,0.15);
            box-shadow: 0 0 10px rgba(255,0,255,0.3);
        }

        .player-card:hover {
            background: rgba(255,255,255,0.1);
        }

        .player-name {
            font-weight: bold;
            color: #ffd700;
            font-size: 1em;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
        }

        .player-name .profile-badge {
            font-size: 0.7em;
            background: #ffd700;
            color: #000;
            padding: 2px 8px;
            border-radius: 12px;
            margin-left: 10px;
        }

        .player-name .profile-badge.best-hand {
            background: #ff00ff;
            color: white;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        .best-hand-selector {
            background: rgba(255,0,255,0.2);
            border: 1px solid #ff00ff;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
        }

        .best-hand-selector label {
            color: #ff00ff;
            font-weight: bold;
            display: block;
            margin-bottom: 10px;
        }

        .best-hand-selector select {
            width: 100%;
            padding: 10px;
            background: #0a0a0a;
            border: 1px solid #ff00ff;
            color: #fff;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
        }

        .best-hand-selector select option {
            background: #1a1a2e;
        }

        .player-controls {
            display: flex;
            gap: 15px;
            align-items: center;
            flex-wrap: wrap;
        }

        .control-group {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(0,0,0,0.5);
            padding: 5px 12px;
            border-radius: 6px;
        }

        .control-group label {
            color: #ccc;
            font-size: 12px;
        }

        .control-group button {
            background: #28a745;
            color: white;
            border: none;
            width: 26px;
            height: 26px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
        }

        .control-group button.minus {
            background: #dc3545;
        }

        .control-group span {
            color: #00ff00;
            font-weight: bold;
            min-width: 30px;
            text-align: center;
            font-size: 14px;
        }

        .total-value {
            color: #ffd700;
            font-size: 14px;
            background: rgba(0,0,0,0.6);
            padding: 5px 12px;
            border-radius: 6px;
            font-weight: bold;
        }

        pre {
            background: #0a0a0a;
            padding: 15px;
            border-radius: 8px;
            overflow-x: auto;
            font-size: 9px;
            max-height: 550px;
            overflow-y: auto;
            color: #00ff00;
            font-family: 'Consolas', 'Courier New', monospace;
            margin-top: 15px;
            border: 1px solid #333;
            white-space: pre-wrap;
            word-wrap: break-word;
            word-break: break-all;
        }

        .status {
            margin-top: 10px;
            padding: 8px;
            border-radius: 6px;
            text-align: center;
            font-size: 13px;
        }

        .status.success {
            background: #28a745;
            color: white;
        }

        .status.error {
            background: #dc3545;
            color: white;
        }

        .status.info {
            background: #17a2b8;
            color: white;
        }

        .players-list::-webkit-scrollbar, pre::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        .players-list::-webkit-scrollbar-track, pre::-webkit-scrollbar-track {
            background: #1a1a2e;
            border-radius: 3px;
        }

        .players-list::-webkit-scrollbar-thumb, pre::-webkit-scrollbar-thumb {
            background: #ffd700;
            border-radius: 3px;
        }

        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
            }
        }

        .btn-group {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 15px;
        }

        .total-summary {
            margin-top: 15px;
            padding: 12px;
            background: rgba(0,0,0,0.5);
            border-radius: 8px;
            text-align: center;
        }

        .total-summary span {
            color: #ffd700;
            font-weight: bold;
            font-size: 1.1em;
        }
    </style>
</head>

        function isOrganizacaoPlayer(playerName) {
            return ORGANIZACAO_PLAYERS.some(name => playerName.toLowerCase() === name.toLowerCase());
        }

        function generateUUID() {
            return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
                const r = Math.random() * 16 | 0;
                const v = c === 'x' ? r : (r & 0x3 | 0x8);
                return v.toString(16);
            });
        }

        function getRakeValue() {
            const rakeInput = document.getElementById('rakeValue');
            return parseInt(rakeInput.value) || 0;
        }

        function updateBestHand() {
            const select = document.getElementById('bestHandPlayer');
            bestHandPlayerUUID = select.value || null;
            displayPreview();
        }

        function populateBestHandSelector() {
            const select = document.getElementById('bestHandPlayer');
            select.innerHTML = '<option value="">Nenhum (selecionar)</option>';
            
            importedPlayers.forEach(player => {
                const option = document.createElement('option');
                option.value = player.uuid;
                option.textContent = player.nickname;
                if (bestHandPlayerUUID === player.uuid) {
                    option.selected = true;
                }
                select.appendChild(option);
            });
        }

        function displayPreview() {
            const container = document.getElementById('previewList');
            if (importedPlayers.length === 0) {
                container.innerHTML = '<div style="text-align:center; color:#888; padding:40px;">Nenhum dado importado</div>';
                document.getElementById('bestHandSelector').style.display = 'none';
                return;
            }

            document.getElementById('bestHandSelector').style.display = 'block';

            let totalEntries = importedPlayers.length;
            let totalRebuys = importedPlayers.reduce((sum, p) => sum + p.rebuys, 0);
            let totalAddons = importedPlayers.reduce((sum, p) => sum + p.addons, 0);
            const rakeValue = getRakeValue();

            container.innerHTML = `
                <div class="total-summary">
                    📊 <span>${totalEntries}</span> Jogadores | 🔁 <span>${totalRebuys}</span> Rebuys | 💰 <span>${totalAddons}</span> Add-ons
                </div>
                ${importedPlayers.map(p => {
                    const isBestHand = (bestHandPlayerUUID === p.uuid);
                    return `
                    <div class="player-card ${isBestHand ? 'best-hand' : ''}">
                        <div class="player-name">
                            ${p.nickname}
                            ${isBestHand ? '<span class="profile-badge best-hand">🏆 MELHOR MÃO 🏆</span>' : ''}
                        </div>
                        <div class="player-controls">
                            <div class="control-group">
                                <label>🔁 Rebuys:</label>
                                <button class="minus" onclick="updateRebuys('${p.uuid}', -1)">-</button>
                                <span id="rebuy-${p.uuid}">${p.rebuys}</span>
                                <button onclick="updateRebuys('${p.uuid}', 1)">+</button>
                            </div>
                            <div class="control-group">
                                <label>💰 Add-ons:</label>
                                <button class="minus" onclick="updateAddons('${p.uuid}', -1)">-</button>
                                <span id="addon-${p.uuid}">${p.addons}</span>
                                <button onclick="updateAddons('${p.uuid}', 1)">+</button>
                            </div>
                        </div>
                    </div>
                `}).join('')}
            `;
        }

        function updateRebuys(uuid, delta) {
            const player = importedPlayers.find(p => p.uuid === uuid);
            if (player) {
                player.rebuys = Math.max(0, player.rebuys + delta);
                displayPreview();
            }
        }

        function updateAddons(uuid, delta) {
            const player = importedPlayers.find(p => p.uuid === uuid);
            if (player) {
                player.addons = Math.max(0, player.addons + delta);
                displayPreview();
            }
        }

        function importCSV() {
            const csvText = document.getElementById('csvInput').value;
            if (!csvText.trim()) {
                showStatus("Por favor, cole os dados do CSV!", "error");
                return;
            }

            const lines = csvText.trim().split(/\r?\n/);
            const players = [];
            let separator = ';';
            if (lines[0] && lines[0].includes(',')) separator = ',';

            for (const line of lines) {
                if (!line.trim()) continue;
                const parts = line.split(separator);
                if (parts.length < 3) continue;
                
                const nickname = parts[0].trim();
                const rebuys = parseInt(parts[1]) || 0;
                const addons = parseInt(parts[2]) || 0;
                let uuid = parts.length > 3 ? parts[3].trim() : null;
                
                if (!uuid || uuid === '') uuid = generateUUID();
                
                if (nickname) {
                    players.push({
                        uuid: uuid,
                        nickname: nickname,
                        rebuys: rebuys,
                        addons: addons,
                        isOrganizacao: isOrganizacaoPlayer(nickname),
                        buyinTime: BUYIN_TIME,
                        lastModified: 1776802998912,
                        lastModifiedInfo: 1776802998916
                    });
                }
            }

            if (players.length === 0) {
                showStatus("Nenhum jogador válido encontrado!", "error");
                return;
            }

            importedPlayers = players;
            bestHandPlayerUUID = null;
            populateBestHandSelector();
            showStatus(`✅ ${players.length} jogadores importados!`, "success");
            displayPreview();
            
            document.getElementById('generateBtn').disabled = false;
            document.getElementById('copyBtn').disabled = false;
        }

        async function fetchFromServer() {
            showStatus("🌐 Buscando dados online... Aguarde!", "info");
            
            try {
                const response = await fetch(ONLINE_DATA_URL, {
                    mode: 'cors',
                    headers: { 'Content-Type': 'text/plain' }
                });
                
                if (response.ok) {
                    const data = await response.text();
                    document.getElementById('csvInput').value = data;
                    importCSV();
                    showStatus("✅ Dados importados do servidor!", "success");
                } else {
                    showStatus("⚠️ Erro ao acessar servidor. Verifique a URL.", "error");
                }
            } catch (error) {
                console.error('Erro:', error);
                showStatus("⚠️ Servidor offline. Importe manualmente.", "error");
            }
        }

        function clearCSV() {
            document.getElementById('csvInput').value = '';
            importedPlayers = [];
            bestHandPlayerUUID = null;
            document.getElementById('previewList').innerHTML = '<div style="text-align:center; color:#888; padding:40px;">Nenhum dado importado</div>';
            document.getElementById('codeOutput').innerText = 'Importe um CSV para gerar o código...';
            document.getElementById('generateBtn').disabled = true;
            document.getElementById('copyBtn').disabled = true;
            document.getElementById('bestHandSelector').style.display = 'none';
            showStatus("Dados limpos!", "success");
        }

        function generateFullCode() {
            if (importedPlayers.length === 0) {
                showStatus("Nenhum jogador importado! Carregue um CSV primeiro.", "error");
                return;
            }

            let playersMapEntries = [];
            const rakeValue = getRakeValue();

            importedPlayers.forEach((player) => {
                // Verifica se o jogador tem add-on grátis (organização OU melhor mão)
                const hasFreeAddon = player.isOrganizacao || (bestHandPlayerUUID === player.uuid);
                // Ambos usam o perfil ORGANIZACAO (já que têm o mesmo benefício)
                const addonProfile = hasFreeAddon ? 'ORGANIZACAO' : 'Master';
                
                const buyinProfile = 'Master';
                const rebuyProfile = 'Master';

                let buyinsArray = [];
                // Buy-in com o valor normal
                buyinsArray.push(`new GameBuyin({Time: ${player.buyinTime || BUYIN_TIME}, Round: 1, Amount: ${BUYIN_FEE}, PersonalBounty: 0, Rake: new PerPlayerRake([0]), Chips: ${CHIPS_PER_BUYIN}, Points: 0, ProfileName: "${buyinProfile}"})`);
                
                for (let i = 0; i < player.rebuys; i++) {
                    buyinsArray.push(`new GameBuyin({Time: ${REBUY_TIME}, Round: 1, Amount: ${REBUY_FEE}, PersonalBounty: 0, Rake: new PerPlayerRake([0]), Chips: ${CHIPS_PER_BUYIN}, Points: 0, ProfileName: "${rebuyProfile}"})`);
                }

                let addonsArray = [];
                const addonFee = hasFreeAddon ? ADDON_FEE_ZERO : ADDON_FEE_NORMAL;
                for (let i = 0; i < player.addons; i++) {
                    addonsArray.push(`new GameAddOn({Time: ${ADDON_TIME}, Round: ${ADDON_ROUND}, Amount: ${addonFee}, Rake: new PerPlayerRake([0]), Chips: ${CHIPS_PER_ADDON}, Points: 0, ProfileName: "${addonProfile}"})`);
                }

                const totalChips = CHIPS_PER_BUYIN + (player.rebuys * CHIPS_PER_BUYIN) + (player.addons * CHIPS_PER_ADDON);
                const lastModified = player.lastModified || 1776802998912;
                const lastModifiedInfo = player.lastModifiedInfo || 1776802998916;

                const playerEntry = `["${player.uuid}", new GamePlayer({ UUID: "${player.uuid}", Name: new PlayerName({UUID: "${player.uuid}", Nickname: "${player.nickname}", Firstname: "", Lastname: "", LastModified: ${lastModified}}), Info: new PlayerInfo({UUID: "${player.uuid}", StreetAddress: "", City: "", State: "", Zipcode: "", Country: "", Phone1: "", Phone2: "", Email1: "", Email2: "", Notes: "", LastModified: ${lastModifiedInfo}, OptID: ""}), Buyins: [${buyinsArray.join(', ')}], AddOns: [${addonsArray.join(', ')}], CashAdjustment: 0, PointsAdjustment: 0, ChipCount: ${totalChips}, NumberOfTableMoves: 1, PaidInFull: true, HitsAdjustment: 0 })]`;
                
                playersMapEntries.push(playerEntry);
            });

            const seatsArray = importedPlayers.map(p => `"${p.uuid}"`).join(', ');
            const locksArray = Array(importedPlayers.length).fill('undefined').join(', ');

            let fullCode = BASE_TEMPLATE
                .replace('RAKE_VALUE_PLACEHOLDER', rakeValue)
                .replace('PLAYERS_PLACEHOLDER', playersMapEntries.join(', '))
                .replace('SEATS_PLACEHOLDER', importedPlayers.length)
                .replace('SEATS_ARRAY_PLACEHOLDER', seatsArray)
                .replace('LOCKS_ARRAY_PLACEHOLDER', locksArray);

            document.getElementById('codeOutput').innerText = fullCode;
            
            const totalRebuys = importedPlayers.reduce((sum, p) => sum + p.rebuys, 0);
            const totalAddons = importedPlayers.reduce((sum, p) => sum + p.addons, 0);
            
            showStatus(`✅ Código gerado! ${importedPlayers.length} jogadores. Rebuys: ${totalRebuys}, Add-ons: ${totalAddons}, Rake configurado: R$ ${rakeValue}`, "success");
        }

        function copyCode() {
            const code = document.getElementById('codeOutput').innerText;
            if (code && code !== 'Importe um CSV para gerar o código...') {
                navigator.clipboard.writeText(code);
                showStatus("📋 Código copiado!", "success");
            } else {
                showStatus("Nenhum código gerado!", "error");
            }
        }

        function showStatus(message, type) {
            const statusDiv = document.getElementById('status');
            statusDiv.textContent = message;
            statusDiv.className = `status ${type}`;
            setTimeout(() => {
                statusDiv.className = 'status';
                statusDiv.textContent = '';
            }, 4000);
        }
    </script>
</body>
